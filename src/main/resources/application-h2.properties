# Configuracion H2 en memoria: solo para pruebas rapidas sin instalar MySQL.
# Se borra todo al reiniciar la aplicacion.
spring.datasource.url=jdbc:h2:mem:elpaisadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
