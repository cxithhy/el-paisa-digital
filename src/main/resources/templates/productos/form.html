<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${producto.idProducto} == null ? 'Nuevo producto - El Paisa Digital' : 'Editar producto - El Paisa Digital'"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/layout :: topbar}"></div>
    <div class="contenedor">
        <div class="encabezado-pagina">
            <h1 th:text="${producto.idProducto} == null ? 'Nuevo producto' : 'Editar producto'"></h1>
        </div>

        <form class="formulario" th:action="@{/productos/guardar}" th:object="${producto}" method="post">
            <!-- Solo se incluye si ya existe un id (edicion); al crear, se omite para que quede null -->
            <input type="hidden" th:if="${producto.idProducto} != null" th:field="*{idProducto}">

            <div class="campo">
                <label>Nombre del plato</label>
                <input type="text" th:field="*{nombre}" required>
            </div>
            <div class="campo">
                <label>Precio (S/)</label>
                <input type="number" step="0.01" th:field="*{precio}" required>
            </div>

            <div class="campo">
                <label>Insumo principal a descontar del stock (opcional)</label>
                <select name="idInsumoPrincipal">
                    <option value="">— Ninguno (no descuenta stock) —</option>
                    <option th:each="i : ${insumos}"
                            th:value="${i.idInsumo}"
                            th:selected="${producto.insumoPrincipal != null and producto.insumoPrincipal.idInsumo == i.idInsumo}"
                            th:text="${i.nombre}"></option>
                </select>
            </div>
            <div class="campo">
                <label>Cantidad de insumo por unidad vendida (ej. 0.30 kg)</label>
                <input type="number" step="0.01" name="cantidadInsumoPorUnidad"
                       th:value="${producto.cantidadInsumoPorUnidad}" placeholder="Dejar vacío si no aplica">
            </div>

            <button type="submit" class="btn" th:text="${producto.idProducto} == null ? 'Guardar producto' : 'Actualizar producto'"></button>
        </form>
    </div>
</body>
</html>
