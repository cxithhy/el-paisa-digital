<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - El Paisa Digital</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/layout :: topbar}"></div>
    <div class="contenedor">
        <div class="encabezado-pagina">
            <div>
                <h1>Ventas registradas</h1>
                <p>Ultimo mes de operacion.</p>
            </div>
            <a th:href="@{/ventas/nueva}" class="btn">+ Nueva venta</a>
        </div>

        <div class="tarjetas">
            <div class="tarjeta">
                <h3 th:text="${resumen.totalVentas}"></h3>
                <p>Ventas registradas este mes</p>
            </div>
            <div class="tarjeta">
                <h3 th:text="'S/ ' + ${resumen.ingresosTotales}"></h3>
                <p>Ingresos totales del mes</p>
            </div>
            <div class="tarjeta">
                <h3 th:text="${resumen.productoMasVendidoNombre}" style="font-size:1.1rem"></h3>
                <p th:text="${resumen.productoMasVendidoCantidad} + ' unidades vendidas — el más pedido del mes'"></p>
            </div>
        </div>

        <div class="tabla-responsive">
        <table>
            <thead>
                <tr><th>ID</th><th>Fecha</th><th>Sede</th><th>Items</th><th>Total</th></tr>
            </thead>
            <tbody>
                <tr th:each="v : ${ventas}">
                    <td data-etiqueta="ID" th:text="${v.idVenta}"></td>
                    <td data-etiqueta="Fecha" th:text="${#temporals.format(v.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>
                    <td data-etiqueta="Sede" th:text="${v.sede.nombre}"></td>
                    <td data-etiqueta="Items" th:text="${v.totalItems}"></td>
                    <td data-etiqueta="Total" th:text="'S/ ' + ${v.total}"></td>
                </tr>
            </tbody>
        </table>
        </div>
    </div>
</body>
</html>
