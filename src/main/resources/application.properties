spring.application.name=El Paisa Digital

# Perfil activo por defecto: mysql (base de datos real y persistente, tal como pide la rubrica).
# Para probar rapido sin instalar MySQL, correr con: mvn spring-boot:run -Dspring-boot.run.profiles=h2
spring.profiles.active=mysql

server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
