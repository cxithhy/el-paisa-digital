spring.application.name=El Paisa Digital

# Perfil activo por defecto: mysql (base de datos real y persistente, tal como pide la rubrica).
# Para probar rapido sin instalar MySQL, correr con: mvn spring-boot:run -Dspring-boot.run.profiles=h2
spring.profiles.active=mysql

server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==== Monitoreo (Spring Boot Actuator) ====
# health: estado de la app y sus dependencias (BD, disco); metrics: metricas JVM/HTTP;
# info: metadata de la app; loggers: nivel de logs en caliente sin reiniciar.
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

info.app.name=El Paisa Digital
info.app.description=Sistema de gestion gastronomica - Curso Integrador I
info.app.version=1.0.0
