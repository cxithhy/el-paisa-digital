# Configuracion para MySQL local (o phpMyAdmin/XAMPP/WAMP).
# 1. Crear la base de datos vacia antes de correr la app: CREATE DATABASE elpaisadb;
# 2. Ajustar usuario/password segun tu instalacion de MySQL.
spring.datasource.url=jdbc:mysql://localhost:3306/elpaisadb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=changeme
